<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>影片下載器</title>
<style>
  :root{
    --bg1:#0f0f17; --bg2:#1a1a28; --card:rgba(255,255,255,.05); --card2:rgba(255,255,255,.08);
    --line:rgba(255,255,255,.12); --txt:#e5e7eb; --dim:#9aa0b0;
    --acc1:#6366f1; --acc2:#8b5cf6; --ok:#22c55e; --err:#ef4444;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; color:var(--txt);
    font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%,#241f3a,transparent),linear-gradient(160deg,var(--bg1),var(--bg2));
    padding:28px 18px;
  }
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:20px;margin:0 0 18px;display:flex;align-items:center;gap:10px}
  h1 .dot{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--acc1),var(--acc2));box-shadow:0 0 12px var(--acc2)}
  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px;backdrop-filter:blur(14px);box-shadow:0 12px 40px rgba(0,0,0,.4);margin-bottom:18px;
  }
  label{display:block;font-size:12px;color:var(--dim);margin:10px 0 5px}
  input,select{
    width:100%;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:10px;
    color:var(--txt);padding:10px 12px;font-size:14px;outline:none;transition:border .15s;
  }
  input:focus,select:focus{border-color:var(--acc2)}
  .row{display:flex;gap:10px}
  .row>div{flex:1}
  .btns{display:flex;gap:10px;margin-top:14px}
  button{
    border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;
    color:#fff;background:var(--card2);transition:filter .12s,background .12s;
  }
  button:hover{background:rgba(255,255,255,.16)}
  button.primary{background:linear-gradient(135deg,var(--acc1),var(--acc2));flex:1}
  button.primary:hover{filter:brightness(1.12)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .hint{font-size:12px;color:var(--dim);margin-top:8px;line-height:1.5}
  .hint b{color:#c4b5fd}
  #qualityBox{display:none}
  .tasks{display:flex;flex-direction:column;gap:10px}
  .empty{color:var(--dim);font-size:13px;text-align:center;padding:18px}
  .task{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .task .top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
  .task .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .task .pct{font-size:12px;color:var(--dim);white-space:nowrap}
  .bar{height:8px;border-radius:6px;background:rgba(255,255,255,.1);overflow:hidden}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--acc1),var(--acc2));transition:width .3s}
  .task.done .bar>i{background:var(--ok)}
  .task.err .bar>i{background:var(--err)}
  .task .log{font-size:11px;color:var(--dim);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:ui-monospace,monospace}
  .task.err .log{color:#fca5a5;white-space:normal}
  .task .x{cursor:pointer;color:var(--dim);font-size:16px;line-height:1;padding:0 2px;border:none;background:none}
  .task .x:hover{color:#fff}
  .toast{position:fixed;bottom:18px;right:18px;background:#000;color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:.92}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot"></span>影片下載器</h1>

  <div class="panel">
    <label>影片網址（觀看頁，或 userscript 嗅到的 m3u8 網址）</label>
    <input id="url" placeholder="https://… 或 …index.m3u8" autocomplete="off">

    <div class="row">
      <div>
        <label>檔名（留空＝自動抓標題）</label>
        <input id="name" placeholder="自動">
      </div>
      <div>
        <label>Referer（防盜鏈站填觀看頁網址，可留空）</label>
        <input id="referer" placeholder="可留空">
      </div>
    </div>

    <div id="qualityBox">
      <label>畫質</label>
      <select id="quality"></select>
    </div>

    <div class="btns">
      <button id="probeBtn">解析畫質</button>
      <button id="dlBtn" class="primary">⬇ 下載</button>
    </div>
    <div class="hint">
      支援站（YouTube/B站/抖音…）貼觀看頁即可。下載到 <b>~/Downloads</b>。<br>
      ⚠️ <b>CF + cookie 鎖的站</b>（skyline / javboys 等，403 解不掉）：外部工具拿不到瀏覽器 cookie，請改用 <b>userscript 面板的「下載」鈕</b>（瀏覽器內 session 才能過 Cloudflare）。
    </div>
  </div>

  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <label style="margin:0">下載進度</label>
      <div style="display:flex;gap:8px">
        <button id="clearDone" style="padding:5px 12px;font-size:12px">清除完成</button>
        <button id="clearAll" style="padding:5px 12px;font-size:12px">全部清除</button>
      </div>
    </div>
    <div class="tasks" id="tasks"><div class="empty">尚無下載</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
function toast(t){const e=$("toast");e.textContent=t;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),1800);}

// 解析畫質
$("probeBtn").addEventListener("click", async () => {
  const url = $("url").value.trim();
  if(!url){ toast("先貼網址"); return; }
  const btn=$("probeBtn"); btn.disabled=true; btn.textContent="解析中…";
  try{
    const r = await fetch("/probe",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({url, referer:$("referer").value.trim()})}).then(r=>r.json());
    if(!r.ok){ toast("解析失敗：" + (r.error||"")); $("qualityBox").style.display="none"; return; }
    if(r.title && !$("name").value.trim()) $("name").value = r.title;
    const sel=$("quality"); sel.innerHTML="";
    const best=document.createElement("option"); best.value=""; best.textContent="最佳畫質（自動）"; sel.appendChild(best);
    for(const f of r.formats){
      const o=document.createElement("option"); o.value=f.id;
      const sz = f.size? " · "+(f.size/1048576).toFixed(0)+"MB":"";
      o.textContent = (f.height? f.height+"p":"?") + " · " + f.ext + (f.note?(" · "+f.note):"") + sz;
      sel.appendChild(o);
    }
    $("qualityBox").style.display = r.formats.length? "block":"none";
    toast(r.formats.length? ("找到 "+r.formats.length+" 種畫質"):"此站無多畫質，可直接下載");
  }catch(e){ toast("解析錯誤"); }
  finally{ btn.disabled=false; btn.textContent="解析畫質"; }
});

// 下載
let taskId=0;
$("dlBtn").addEventListener("click", () => {
  const url=$("url").value.trim();
  if(!url){ toast("先貼網址"); return; }
  const fmt = $("qualityBox").style.display!=="none" ? $("quality").value : "";
  const name=$("name").value.trim();
  const referer=$("referer").value.trim();

  const id="t"+(++taskId);
  const tasks=$("tasks");
  const empty=tasks.querySelector(".empty"); if(empty) empty.remove();
  const el=document.createElement("div"); el.className="task"; el.id=id;
  el.innerHTML=`<div class="top"><span class="nm">${(name||url).replace(/</g,"&lt;")}</span>
    <span style="display:flex;align-items:center;gap:8px"><span class="pct">啟動中…</span><button class="x" title="取消/移除">✕</button></span></div>
    <div class="bar"><i></i></div><div class="log"></div>`;
  tasks.prepend(el);
  const bar=el.querySelector("i"), pct=el.querySelector(".pct"), log=el.querySelector(".log");

  const qs=new URLSearchParams({url, format:fmt, name, referer});
  const es=new EventSource("/download?"+qs.toString());

  // ✕：取消下載並移除卡片（關閉 EventSource → 後端 yt-dlp 被 kill）
  el.querySelector(".x").addEventListener("click", ()=>{ try{es.close();}catch{}; el.remove(); checkEmpty(); });
  es.onmessage=(m)=>{
    const d=JSON.parse(m.data);
    if(d.type==="progress"){ bar.style.width=d.pct+"%"; pct.textContent=d.pct.toFixed(1)+"%"; }
    else if(d.type==="log"){ log.textContent=d.line; }
    else if(d.type==="done"){ bar.style.width="100%"; pct.textContent="完成 ✓"; el.classList.add("done"); es.close(); toast("下載完成"); }
    else if(d.type==="error"){ pct.textContent="錯誤"; el.classList.add("err"); if(d.line)log.textContent=d.line; es.close(); }
  };
  es.onerror=()=>{ es.close(); };
  toast("開始下載");
});

// 清除鈕
function checkEmpty(){ const t=$("tasks"); if(!t.querySelector(".task")) t.innerHTML='<div class="empty">尚無下載</div>'; }
$("clearDone").addEventListener("click", ()=>{ document.querySelectorAll(".task.done,.task.err").forEach(e=>e.remove()); checkEmpty(); });
$("clearAll").addEventListener("click", ()=>{ document.querySelectorAll(".task").forEach(e=>{ e.remove(); }); checkEmpty(); });

// Enter 鍵解析
$("url").addEventListener("keydown",(e)=>{ if(e.key==="Enter") $("probeBtn").click(); });
</script>
</body>
</html>
